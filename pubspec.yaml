name: tradelink
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.8.0
  easy_localization: ^3.0.7
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  http: ^1.2.2
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  socket_io_client: ^2.0.3+1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
